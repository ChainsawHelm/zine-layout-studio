function buildPageSvg(pageElements, pw, ph, pageW, pageH) {
  let elementsHtml = '';
  pageElements.forEach(el => {
    autoSizeElement(el);
    const left = el.x;
    const top = el.y;
    const transforms = [];
    if (el.flipped) {
      transforms.push(`translate(${el.x + el.w},${el.y + el.h}) rotate(180) translate(${-el.x},${-el.y})`);
    }
    const transformAttr = transforms.length ? ` transform="${transforms.join(' ')}"` : '';
    const svgInner = drawElement(el);
    const match = svgInner.match(/<svg[^>]*>([\s\S]*?)<\/svg>/);
    const inner = match ? match[1] : '';
    const vbMatch = svgInner.match(/viewBox="([^"]+)"/);
    const vb = vbMatch ? vbMatch[1] : `0 0 ${el.w} ${el.h}`;
    elementsHtml += `<svg x="${left}" y="${top}" width="${el.w}" height="${el.h}" viewBox="${vb}" preserveAspectRatio="${el.type === 'text' || el.type === 'date-header' ? 'xMinYMin meet' : 'none'}"${transformAttr}>${inner}</svg>\n`;
  });

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${pageW}" height="${pageH}" viewBox="0 0 ${pw} ${ph}">
  <rect width="${pw}" height="${ph}" fill="white"/>
  <line x1="0" y1="${ph/2}" x2="${pw*0.25}" y2="${ph/2}" stroke="#000" stroke-width="0.5" stroke-dasharray="1.5,4.5"/>
  <line x1="${pw*0.75}" y1="${ph/2}" x2="${pw}" y2="${ph/2}" stroke="#000" stroke-width="0.5" stroke-dasharray="1.5,4.5"/>
  <line x1="${pw*0.25}" y1="0" x2="${pw*0.25}" y2="${ph}" stroke="#000" stroke-width="0.5" stroke-dasharray="1.5,4.5"/>
  <line x1="${pw*0.5}" y1="0" x2="${pw*0.5}" y2="${ph}" stroke="#000" stroke-width="0.5" stroke-dasharray="1.5,4.5"/>
  <line x1="${pw*0.75}" y1="0" x2="${pw*0.75}" y2="${ph}" stroke="#000" stroke-width="0.5" stroke-dasharray="1.5,4.5"/>
  <line x1="${pw*0.25}" y1="${ph/2}" x2="${pw*0.75}" y2="${ph/2}" stroke="#e44" stroke-width="0.75" stroke-dasharray="6,4"/>
  <text x="${pw*0.25 + 2}" y="${ph/2 - 3}" font-size="7" font-family="'DM Mono', monospace" fill="#e44">✂ cut</text>
  ${elementsHtml}
</svg>`;
}

function exportPDF() {
  const pw = PAPER[orientation].w;
  const ph = PAPER[orientation].h;
  const isLandscape = orientation === 'landscape';
  const pageW = isLandscape ? '11in' : '8.5in';
  const pageH = isLandscape ? '8.5in' : '11in';

  const mode = document.getElementById('batch-mode').value;
  const count = mode === 'single' ? 1 : parseInt(document.getElementById('batch-count').value) || 1;

  const printWin = window.open('', '_blank');
  if (!printWin) { toast('Pop-up blocked — allow pop-ups and try again'); return; }

  let pages = '';
  const today = new Date();

  for (let i = 0; i < count; i++) {
    const date = new Date(today);
    if (mode === 'weekly') date.setDate(date.getDate() + i * 7);
    else if (mode === 'daily') date.setDate(date.getDate() + i);

    const pageEls = mode === 'single' ? elements : updateDateElements(elements, date);
    pages += buildPageSvg(pageEls, pw, ph, pageW, pageH);
    if (i < count - 1) pages += '\n';
  }

  printWin.document.write(`<!DOCTYPE html>
<html><head><title>Zine Layout</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  @page { size: ${pageW} ${pageH}; margin: 0; }
  * { margin: 0; padding: 0; }
  body { margin: 0; }
  svg { display: block; page-break-after: always; }
  svg:last-of-type { page-break-after: auto; }
</style>
</head><body>
${pages}
<script>
  document.fonts.ready.then(() => {
    setTimeout(() => { window.print(); }, 300);
  });
<\/script>
</body></html>`);
  printWin.document.close();
}

function exportJSON() {
  const data = JSON.stringify(getProjectData(), null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'zine-layout.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Layout saved to file');
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        loadProjectData(JSON.parse(ev.target.result));
        toast('Layout loaded');
      } catch (err) { toast('Error loading file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ══════════════════════════════════════
// TEMPLATES (localStorage)
// ══════════════════════════════════════
function getTemplates() {
  try { return JSON.parse(localStorage.getItem('zine-templates') || '[]'); }
  catch { return []; }
}

function saveTemplates(templates) {
  localStorage.setItem('zine-templates', JSON.stringify(templates));
}

function showTemplateDialog() {
  const container = document.getElementById('modal-container');
  const templates = getTemplates();

  let templateListHtml = '';
  if (templates.length === 0) {
    templateListHtml = '<div class="empty-state">No saved templates yet.</div>';
  } else {
    templates.forEach((t, i) => {
      templateListHtml += `
        <div class="template-item" onclick="loadTemplate(${i})">
          <span class="t-name">${escapeHtml(t.name)}</span>
          <span class="t-date">${t.date || ''}</span>
          <span class="t-actions">
            <button class="small danger" onclick="event.stopPropagation(); deleteTemplate(${i})">×</button>
          </span>
        </div>
      `;
    });
  }

  container.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Templates</h3>
        <div style="margin-bottom:12px;">
          <div class="control-label" style="margin-bottom:4px;">Save current layout as template:</div>
          <div style="display:flex;gap:6px;">
            <input type="text" id="template-name-input" placeholder="Template name..." style="flex:1;">
            <button class="small primary" onclick="saveCurrentAsTemplate()">Save</button>
          </div>
        </div>
        <div style="max-height:300px;overflow-y:auto;">
          ${templateListHtml}
        </div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
          <div class="control-label" style="margin-bottom:4px;">Project files (JSON):</div>
          <div style="display:flex;gap:6px;">
            <button class="small" style="flex:1" onclick="exportJSON(); closeModal();">Export JSON</button>
            <button class="small" style="flex:1" onclick="importJSON(); closeModal();">Import JSON</button>
          </div>
        </div>
        <div class="modal-actions">
          <button onclick="closeModal()">Close</button>
        </div>
      </div>
    </div>
  `;
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

function saveCurrentAsTemplate() {
  const nameInput = document.getElementById('template-name-input');
  const name = nameInput.value.trim();
  if (!name) { toast('Enter a template name'); return; }

  const templates = getTemplates();
  templates.push({
    name,
    date: new Date().toLocaleDateString(),
    data: getProjectData()
  });
  saveTemplates(templates);
  toast(`Template "${name}" saved`);
  showTemplateDialog(); // refresh
}

function loadTemplate(index) {
  const templates = getTemplates();
  if (templates[index]) {
    loadProjectData(templates[index].data);
    closeModal();
    toast(`Loaded "${templates[index].name}"`);
  }
}

function deleteTemplate(index) {
  const templates = getTemplates();
  const name = templates[index].name;
  if (!confirm(`Delete template "${name}"?`)) return;
  templates.splice(index, 1);
  saveTemplates(templates);
  toast(`Deleted "${name}"`);
  showTemplateDialog(); // refresh
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 1500);
}

// ══════════════════════════════════════
// RENDER ALL
// ══════════════════════════════════════
function renderAll() {
  renderPaper();
  renderCanvasElements();
  renderPanelSelector();
  renderElementList();
  renderProperties();
}

renderAll();
</script>
